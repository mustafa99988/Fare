<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Lift UAE</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: 
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.75)),
        url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center center/cover;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.7);
    min-height: 100vh;
    padding: 20px;
}

.app {
    max-width: 400px;
    margin: auto;
}

.card {
    background: rgba(30,30,30,0.9);
    padding: 20px;
    border-radius: 15px;
}

h2 {
    text-align: center;
}

select, input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #00c853;
    color: white;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
}

.whatsapp {
    background: #25D366;
}

.lang-btn {
    background: #2196f3;
    margin-bottom: 10px;
}

.result {
    margin-top: 15px;
    font-size: 22px;
    text-align: center;
    color: #00e676;
}

.small {
    text-align: center;
    font-size: 14px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="overlay">
<div class="app">
<div class="card">

<button class="lang-btn" onclick="toggleLang()">🌐 عربي / English</button>

<h2 id="title">🚖 Car Lift UAE</h2>

<select id="tripType" onchange="toggleRoute()">
    <option value="booking">Booking Carlift</option>
    <option value="other">Other Emirates</option>
</select>

<div id="kmSection">
    <input type="number" id="distance" placeholder="Distance (KM)">
    <input type="number" id="waiting" placeholder="Waiting Time (minutes)">
</div>

<div id="routeSection" style="display:none;">
    <select id="route">
        <option value="70">Dubai → Sharjah (70 AED)</option>
        <option value="200">Dubai → Abu Dhabi (200 AED)</option>
        <option value="85">Dubai → Ajman (85 AED)</option>
        <option value="130">Dubai → Ras Al Khaimah (130 AED)</option>
        <option value="180">Dubai → Fujairah (180 AED)</option>
        <option value="190">Dubai → Al Ain (190 AED)</option>
    </select>
</div>

<button onclick="calculateFare()" id="calcBtn">Calculate Fare</button>

<div class="result" id="result">AED 0.00</div>

<button class="whatsapp" onclick="sendWhatsApp()" id="waBtn">📱 Check Availability Over Whatsapp</button>

<div class="small" id="phone">WhatsApp: +971505402261</div>

</div>
</div>
</div>

<script>
let finalFare = 0;
let currentLang = "en";

function toggleRoute() {
    let type = document.getElementById("tripType").value;
    document.getElementById("kmSection").style.display = (type === "other") ? "none" : "block";
    document.getElementById("routeSection").style.display = (type === "other") ? "block" : "none";
}

function calculateFare() {
    let type = document.getElementById("tripType").value;
    let fare = 0;

    if (type === "other") {
        fare = parseFloat(document.getElementById("route").value);
    } else {
        let distance = parseFloat(document.getElementById("distance").value) || 0;
        let waiting = parseFloat(document.getElementById("waiting").value) || 0;

        let baseFare = (type === "booking") ? 8 : 4;
        let perKm = 1.7;
        let minFare = (type === "booking") ? 12 : 8;
        let waitingRate = 0.5;

        fare = baseFare + (distance * perKm) + (waiting * waitingRate);

        if (fare < minFare) fare = minFare;
    }

    finalFare = fare;
    document.getElementById("result").innerText = "AED " + fare.toFixed(2);
}

function sendWhatsApp() {
    if (finalFare === 0) {
        alert(currentLang === "en" ? "Please calculate fare first" : "احسب السعر أولاً");
        return;
    }

    let message = currentLang === "en" 
        ? "Hello, I want to book a ride. Estimated Fare: AED " + finalFare
        : "مرحبا، أريد حجز رحلة. السعر المتوقع: " + finalFare + " درهم";

    let url = "https://wa.me/971505402261?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
}

function toggleLang() {
    if (currentLang === "en") {
        currentLang = "ar";
        document.documentElement.dir = "rtl";

        document.getElementById("title").innerText = "🚖 خدمة توصيل";
        document.getElementById("calcBtn").innerText = "احسب السعر";
        document.getElementById("waBtn").innerText = "📱 تواصل لمعرفه امكانيه الحجز";
        document.getElementById("phone").innerText = "واتساب: +971505402261";

        document.getElementById("distance").placeholder = "المسافة (كم)";
        document.getElementById("waiting").placeholder = "وقت الانتظار (دقائق)";

    } else {
        currentLang = "en";
        document.documentElement.dir = "ltr";

        document.getElementById("title").innerText = "🚖 Car Lift UAE";
        document.getElementById("calcBtn").innerText = "Calculate Fare";
        document.getElementById("waBtn").innerText = "📱 Book via WhatsApp";
        document.getElementById("phone").innerText = "WhatsApp: +971505402261";

        document.getElementById("distance").placeholder = "Distance (KM)";
        document.getElementById("waiting").placeholder = "Waiting Time (minutes)";
    }
}
</script>

</body>
</html>
